name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS (Apple Silicon)
          - os: ubuntu-24.04-arm
            name: Linux ARM64
    name: "${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    env:
      # Gemini API key for demo tests that exercise AI features
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 (Deephaven + QuestDB)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install all dependencies
        run: uv sync --frozen --all-extras

      # ARM runner: pre-pull the Deephaven Docker image so tests don't timeout
      - name: Pull Deephaven Docker image (ARM only)
        if: runner.arch == 'ARM64' && runner.os == 'Linux'
        run: docker pull ghcr.io/deephaven/server:latest

      - name: Make test scripts executable
        run: chmod +x run_all_tests.sh run_tests.sh run_demo_tests.sh

      - name: Run full test suite
        run: uv run ./run_all_tests.sh

