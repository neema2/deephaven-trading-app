# Holiday calendar definitions for major currencies.
# Deterministic rules (weekends, fixed dates) + Ad-hoc overrides.

USD:
  weekend: [5, 6]  # Sat, Sun
  fixed:
    - [1, 1]   # New Year
    - [12, 25] # Christmas
    - [7, 4]   # Independence Day
  ad_hoc:  # Extracted from QuantLib or Fed Reserve
    - "2024-01-15" # MLK
    - "2024-02-19" # Presidents
    - "2024-05-27" # Memorial
    - "2024-06-19" # Juneteenth
    - "2024-09-02" # Labor
    - "2024-10-14" # Columbus
    - "2024-11-11" # Veterans
    - "2024-11-28" # Thanksgiving

EUR:
  weekend: [5, 6]
  fixed:
    - [1, 1]
    - [12, 25]
    - [12, 26] # Boxing day / St Stephen
    - [5, 1]   # May Day
  ad_hoc:
    - "2024-03-29" # Good Friday
    - "2024-04-01" # Easter Monday

GBP:
  weekend: [5, 6]
  fixed:
    - [1, 1]
    - [12, 25]
    - [12, 26]
  ad_hoc:
    - "2024-03-29"
    - "2024-04-01"
    - "2024-05-06" # Early May Bank Holiday
    - "2024-05-27" # Spring Bank Holiday
    - "2024-08-26" # Summer Bank Holiday

JPY:
  weekend: [5, 6]
  fixed:
    - [1, 1]
    - [1, 2]
    - [1, 3]
    - [2, 11] # Nat Found
    - [2, 23] # Emperor
    - [4, 29] # Showa
    - [5, 3]  # Const
    - [5, 4]  # Green
    - [5, 5]  # Children
    - [11, 3] # Culture
    - [11, 23] # Labour
  ad_hoc: []
