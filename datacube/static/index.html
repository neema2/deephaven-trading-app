<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Datacube</title>

    <!-- Perspective 4.x CDN -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@perspective-dev/viewer-datagrid@4.0.0/dist/cdn/perspective-viewer-datagrid.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@perspective-dev/viewer-d3fc@4.0.0/dist/cdn/perspective-viewer-d3fc.js"></script>
    <link rel="stylesheet" crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/@perspective-dev/viewer@4.0.0/dist/css/themes.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ─────────────────────────────────────── */
        #sidebar {
            width: 280px;
            min-width: 280px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 12px;
            gap: 12px;
        }

        #sidebar h1 {
            font-size: 16px;
            font-weight: 600;
            color: #e94560;
            letter-spacing: 0.5px;
        }

        .section {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            padding: 10px;
        }

        .section-header {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header .badge {
            background: #0f3460;
            color: #e94560;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
        }

        /* Checkbox groups */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 200px;
            overflow-y: auto;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .checkbox-group label:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        .checkbox-group input[type="checkbox"] {
            accent-color: #e94560;
        }

        .dim-tag {
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 3px;
            background: #0f3460;
            color: #aaa;
            margin-left: auto;
        }

        /* Ordered pill list for group-by / pivot-by */
        .pill-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-bottom: 6px;
        }

        .pill-item {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #0f3460;
            border: 1px solid #e94560;
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 11px;
        }

        .pill-item .pill-num {
            color: #e94560;
            font-weight: 700;
            font-size: 10px;
            min-width: 14px;
        }

        .pill-item .pill-name {
            flex: 1;
            color: #e0e0e0;
        }

        .pill-item .pill-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 11px;
            padding: 0 2px;
            line-height: 1;
        }

        .pill-item .pill-btn:hover {
            color: #e94560;
        }

        .avail-dims {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .avail-dim {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 11px;
            color: #aaa;
            cursor: pointer;
        }

        .avail-dim:hover {
            border-color: #e94560;
            color: #e0e0e0;
        }

        /* Aggregation dropdowns */
        .agg-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 200px;
            overflow-y: auto;
        }

        .agg-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .agg-row select {
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #0f3460;
            border-radius: 3px;
            padding: 2px 4px;
            font-size: 11px;
        }

        .agg-row .col-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Filter builder */
        .filter-row {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
            align-items: center;
        }

        .filter-row select, .filter-row input {
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #0f3460;
            border-radius: 3px;
            padding: 3px 4px;
            font-size: 11px;
        }

        .filter-row select { width: 80px; }
        .filter-row input { width: 70px; }

        .btn {
            background: #0f3460;
            color: #e0e0e0;
            border: none;
            border-radius: 3px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
        }

        .btn:hover { background: #e94560; color: #fff; }

        .btn-sm {
            padding: 2px 6px;
            font-size: 10px;
        }

        /* Sort */
        .sort-row {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
            align-items: center;
        }

        .sort-row select {
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #0f3460;
            border-radius: 3px;
            padding: 3px 4px;
            font-size: 11px;
        }

        /* SQL preview */
        #sql-preview {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 10px;
            color: #aaa;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
            padding: 6px;
            background: #111;
            border-radius: 4px;
            display: none;
        }

        #sql-toggle {
            cursor: pointer;
            user-select: none;
        }

        /* Status bar */
        #status {
            font-size: 11px;
            color: #888;
            padding: 6px 0;
            border-top: 1px solid #0f3460;
            margin-top: auto;
        }

        /* ── Grid area ───────────────────────────────────── */
        #grid-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        perspective-viewer {
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar">
        <h1>&#9671; Datacube</h1>

        <!-- Group By (ordered) -->
        <div class="section">
            <div class="section-header">
                Group By
                <span class="badge" id="group-by-count">0</span>
            </div>
            <div class="pill-list" id="group-by-pills"></div>
            <div class="avail-dims" id="group-by-avail"></div>
        </div>

        <!-- Pivot By (ordered) -->
        <div class="section">
            <div class="section-header">
                Pivot By
                <span class="badge" id="pivot-by-count">0</span>
            </div>
            <div class="pill-list" id="pivot-by-pills"></div>
            <div class="avail-dims" id="pivot-by-avail"></div>
        </div>

        <!-- Columns (show/hide + reorder) -->
        <div class="section">
            <div class="section-header">
                Columns
                <span class="badge" id="col-count">0</span>
            </div>
            <div class="pill-list" id="col-visible-pills"></div>
            <div class="avail-dims" id="col-hidden-list"></div>
        </div>

        <!-- Aggregation -->
        <div class="section">
            <div class="section-header">Aggregation</div>
            <div class="agg-group" id="agg-list"></div>
        </div>

        <!-- Filters -->
        <div class="section">
            <div class="section-header">
                Filters
                <button class="btn btn-sm" id="add-filter-btn">+ Add</button>
            </div>
            <div id="filter-list"></div>
            <button class="btn" id="clear-filters-btn" style="margin-top:4px; display:none;">Clear All</button>
        </div>

        <!-- Sort -->
        <div class="section">
            <div class="section-header">
                Sort
                <button class="btn btn-sm" id="add-sort-btn">+ Add</button>
            </div>
            <div id="sort-list"></div>
        </div>

        <!-- Drill Path -->
        <div class="section" id="drill-section">
            <div class="section-header">
                Drill Path
                <div>
                    <button class="btn btn-sm" id="drill-up-btn" style="display:none;">&#9650; Up</button>
                    <button class="btn btn-sm" id="drill-reset-btn" style="display:none;">Reset</button>
                </div>
            </div>
            <div id="drill-path" style="font-size:12px;">All (leaf rows)</div>
        </div>

        <!-- SQL Preview -->
        <div class="section">
            <div class="section-header" id="sql-toggle">SQL Preview &#9660;</div>
            <pre id="sql-preview"></pre>
        </div>

        <!-- Status -->
        <div id="status">Connecting...</div>
    </div>

    <!-- Grid -->
    <div id="grid-area">
        <perspective-viewer id="viewer" theme="Pro Dark"></perspective-viewer>
    </div>

    <script type="module">
        import "https://cdn.jsdelivr.net/npm/@perspective-dev/viewer@4.0.0/dist/cdn/perspective-viewer.js";
        import perspective from "https://cdn.jsdelivr.net/npm/@perspective-dev/client@4.0.0/dist/cdn/perspective.js";

        // ── Connect to Perspective data channel ──────────
        const viewer = document.getElementById("viewer");
        const pspWs = await perspective.websocket(`ws://${location.host}/websocket`);

        async function loadTable(name) {
            const table = await pspWs.open_table(name);
            await viewer.load(table);
            viewer.setAttribute("settings", "false");
        }
        await loadTable("dc_0");

        // ── Connect to datacube command channel ──────────
        const cmdWs = new WebSocket(`ws://${location.host}/cmd`);

        let state = null;
        let allColumns = [];
        let savedColumnOrder = null;  // visible columns in order — persists across re-queries
        let knownColumns = new Set();  // all columns we've ever seen — to detect truly new ones
        let lastPivotBy = [];  // track pivot_by changes to reset column state

        cmdWs.onmessage = async (event) => {
            const msg = JSON.parse(event.data);
            if (msg.error) {
                document.getElementById("status").textContent = `Error: ${msg.error}`;
                return;
            }

            // Detect pivot_by change — transform column state for new pivoted names
            const newPivotBy = msg.state?.pivot_by || [];
            const pivotChanged = JSON.stringify(newPivotBy) !== JSON.stringify(lastPivotBy);
            if (pivotChanged && savedColumnOrder) {
                const oldPivotBy = lastPivotBy;
                lastPivotBy = newPivotBy;
                // Transform savedColumnOrder: map old visible measures → pivoted equivalents
                // e.g. "passengers" → "Standard / passengers", "JFK / passengers", ...
                // or "Standard / passengers" → "passengers" (when removing pivot)
                const sep = " / ";
                // Extract base measure names from current savedColumnOrder
                const visibleBases = new Set();
                for (const col of savedColumnOrder) {
                    if (col.startsWith("__")) continue;
                    if (oldPivotBy.length > 0 && col.includes(sep)) {
                        // Was pivoted — extract base: "Standard / passengers" → "passengers"
                        const parts = col.split(sep);
                        visibleBases.add(parts[parts.length - 1]);
                    } else {
                        visibleBases.add(col);
                    }
                }
                // Will be applied after loadTable when we know the new column names
                savedColumnOrder = null;
                knownColumns = new Set();
                // Store visible bases for filtering after reload
                window._pivotVisibleBases = visibleBases;
            } else if (pivotChanged) {
                lastPivotBy = newPivotBy;
                knownColumns = new Set();
            }

            // Schema changed — server created a new versioned table
            if (msg.type === "reload" && msg.table_name) {
                await loadTable(msg.table_name);
                // Right after load, viewer has ALL table columns visible
                // Grab them NOW before anything else modifies the viewer
                const fullConfig = await viewer.save();
                const allTableCols = fullConfig.columns || [];
                const allTableSet = new Set(allTableCols);
                const sep = " / ";

                // If pivot just changed, filter columns to only show previously visible measures
                if (window._pivotVisibleBases) {
                    const bases = window._pivotVisibleBases;
                    delete window._pivotVisibleBases;
                    const filtered = allTableCols.filter(c => {
                        if (c.startsWith("__")) return true;  // always show __tree__
                        // Check if this column's base measure was visible
                        if (c.includes(sep)) {
                            const parts = c.split(sep);
                            return bases.has(parts[parts.length - 1]);
                        }
                        return bases.has(c);
                    });
                    savedColumnOrder = filtered;
                    await viewer.restore({ columns: filtered });
                } else if (savedColumnOrder) {
                    // Keep saved visible columns that still exist
                    const ordered = savedColumnOrder.filter(c => allTableSet.has(c));
                    // Auto-add only TRULY NEW columns (never seen before)
                    const newCols = allTableCols.filter(c =>
                        !ordered.includes(c) && !knownColumns.has(c)
                    );
                    // Put __tree__ and __ prefixed at the front, other new cols at the end
                    const frontCols = newCols.filter(c => c.startsWith("__"));
                    const backCols = newCols.filter(c => !c.startsWith("__"));
                    const finalCols = [...frontCols, ...ordered, ...backCols];
                    savedColumnOrder = finalCols;
                    await viewer.restore({ columns: finalCols });
                }
                // Track all columns from this table as known
                allTableCols.forEach(c => knownColumns.add(c));
            }
            if (msg.state) {
                state = msg.state;
                allColumns = state.columns;
                // Track all source columns as known
                allColumns.forEach(c => knownColumns.add(c.name));
                renderSidebar();
            }
            // For non-reload updates (same schema), re-apply column order
            if (msg.type === "update" && savedColumnOrder) {
                try {
                    await viewer.restore({ columns: savedColumnOrder });
                } catch(e) {}
            }
            if (msg.sql) {
                document.getElementById("sql-preview").textContent = msg.sql;
            }
            if (msg.row_count !== undefined) {
                document.getElementById("status").textContent =
                    `${msg.row_count.toLocaleString()} rows | ${state.source || ""}`;
            }
        };

        function send(obj) {
            if (cmdWs.readyState === WebSocket.OPEN) {
                cmdWs.send(JSON.stringify(obj));
            }
        }

        // ── Sidebar rendering ────────────────────────────

        function dimensions() {
            return allColumns.filter(c => c.kind === "dimension");
        }

        function measures() {
            return allColumns.filter(c => c.kind === "measure");
        }

        function renderSidebar() {
            renderGroupBy();
            renderPivotBy();
            renderColumns();
            renderAgg();
            renderFilters();
            renderSort();
            renderDrill();
        }

        // Group By (ordered pill list)
        function renderGroupBy() {
            const fields = state.group_by;  // already ordered
            document.getElementById("group-by-count").textContent = fields.length;
            renderOrderedPills("group-by-pills", "group-by-avail", fields, "group_by");
        }

        // Pivot By (ordered pill list)
        function renderPivotBy() {
            const fields = state.pivot_by;
            document.getElementById("pivot-by-count").textContent = fields.length;
            renderOrderedPills("pivot-by-pills", "pivot-by-avail", fields, "pivot_by");
        }

        function renderOrderedPills(pillsId, availId, currentFields, cmd) {
            const pillsEl = document.getElementById(pillsId);
            const availEl = document.getElementById(availId);
            const selectedSet = new Set(currentFields);
            const dims = dimensions();

            // Active pills (numbered, with reorder + remove)
            pillsEl.innerHTML = currentFields.map((name, idx) => `
                <div class="pill-item" data-name="${name}">
                    <span class="pill-num">${idx + 1}</span>
                    <span class="pill-name">${name}</span>
                    ${idx > 0 ? `<button class="pill-btn pill-up" data-idx="${idx}" title="Move up">&#9650;</button>` : ""}
                    ${idx < currentFields.length - 1 ? `<button class="pill-btn pill-down" data-idx="${idx}" title="Move down">&#9660;</button>` : ""}
                    <button class="pill-btn pill-remove" data-idx="${idx}" title="Remove">&#10005;</button>
                </div>
            `).join("");

            // Available dimensions (not yet selected)
            const available = dims.filter(c => !selectedSet.has(c.name));
            availEl.innerHTML = available.map(c =>
                `<span class="avail-dim" data-name="${c.name}">${c.name}</span>`
            ).join("");

            // Event: click available dim → add to end
            availEl.querySelectorAll(".avail-dim").forEach(el => {
                el.addEventListener("click", () => {
                    send({ cmd, fields: [...currentFields, el.dataset.name] });
                });
            });

            // Event: remove pill
            pillsEl.querySelectorAll(".pill-remove").forEach(btn => {
                btn.addEventListener("click", () => {
                    const idx = parseInt(btn.dataset.idx);
                    const newFields = [...currentFields];
                    newFields.splice(idx, 1);
                    send({ cmd, fields: newFields });
                });
            });

            // Event: move up
            pillsEl.querySelectorAll(".pill-up").forEach(btn => {
                btn.addEventListener("click", () => {
                    const idx = parseInt(btn.dataset.idx);
                    const newFields = [...currentFields];
                    [newFields[idx - 1], newFields[idx]] = [newFields[idx], newFields[idx - 1]];
                    send({ cmd, fields: newFields });
                });
            });

            // Event: move down
            pillsEl.querySelectorAll(".pill-down").forEach(btn => {
                btn.addEventListener("click", () => {
                    const idx = parseInt(btn.dataset.idx);
                    const newFields = [...currentFields];
                    [newFields[idx], newFields[idx + 1]] = [newFields[idx + 1], newFields[idx]];
                    send({ cmd, fields: newFields });
                });
            });
        }

        // Column chooser (show/hide + reorder via Perspective viewer API)
        async function renderColumns() {
            const config = await viewer.save();
            const visible = config.columns || [];
            const visibleSet = new Set(visible);

            // All possible columns from the table schema
            const allNames = allColumns.map(c => c.name);
            const hidden = allNames.filter(c => !visibleSet.has(c));

            document.getElementById("col-count").textContent = visible.length;

            // All columns as a unified draggable list — visible first, then hidden
            const pillsEl = document.getElementById("col-visible-pills");
            const hiddenEl = document.getElementById("col-hidden-list");

            // Visible: draggable pills with hide button
            pillsEl.innerHTML = visible.map((name, idx) => `
                <div class="pill-item" data-name="${name}" data-idx="${idx}" data-visible="1" draggable="true" style="cursor:grab">
                    <span class="pill-name">${name}</span>
                    <button class="pill-btn pill-remove" data-idx="${idx}" title="Hide">&#10005;</button>
                </div>
            `).join("");

            // Hidden: draggable pills (dimmed) — full rows, not tags
            hiddenEl.innerHTML = hidden.map(name => `
                <div class="pill-item" data-name="${name}" data-visible="0" draggable="true"
                     style="cursor:grab; opacity:0.45; border-color:#333">
                    <span class="pill-name">${name}</span>
                    <button class="pill-btn pill-add" data-name="${name}" title="Show">+</button>
                </div>
            `).join("");

            // Unified drag state
            let dragName = null;
            let dragWasVisible = false;

            // Attach drag handlers to ALL pills (visible + hidden)
            const allPills = [...pillsEl.querySelectorAll(".pill-item"), ...hiddenEl.querySelectorAll(".pill-item")];
            allPills.forEach(pill => {
                pill.addEventListener("dragstart", (e) => {
                    dragName = pill.dataset.name;
                    dragWasVisible = pill.dataset.visible === "1";
                    pill.style.opacity = "0.3";
                    e.dataTransfer.effectAllowed = "move";
                    e.dataTransfer.setData("text/plain", dragName);
                });
                pill.addEventListener("dragend", () => {
                    pill.style.opacity = pill.dataset.visible === "1" ? "1" : "0.45";
                    // Clear all drop indicators
                    allPills.forEach(p => p.style.borderTop = "");
                    pillsEl.style.borderBottom = "";
                });
            });

            // Visible pills accept drops (reorder or insert from hidden)
            pillsEl.querySelectorAll(".pill-item").forEach(pill => {
                pill.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = "move";
                    pill.style.borderTop = "2px solid #e94560";
                });
                pill.addEventListener("dragleave", () => {
                    pill.style.borderTop = "";
                });
                pill.addEventListener("drop", async (e) => {
                    e.preventDefault();
                    pill.style.borderTop = "";
                    const dropIdx = parseInt(pill.dataset.idx);
                    if (!dragName || dragName === pill.dataset.name) return;

                    const newCols = [...visible];
                    if (dragWasVisible) {
                        // Reorder within visible
                        const srcIdx = newCols.indexOf(dragName);
                        if (srcIdx < 0) return;
                        newCols.splice(srcIdx, 1);
                        newCols.splice(dropIdx, 0, dragName);
                    } else {
                        // Insert from hidden at this position
                        newCols.splice(dropIdx, 0, dragName);
                    }
                    savedColumnOrder = newCols;
                    await viewer.restore({ columns: newCols });
                    renderColumns();
                });
            });

            // Also accept drop at the END of the visible list
            pillsEl.addEventListener("dragover", (e) => {
                if (e.target === pillsEl) {
                    e.preventDefault();
                    pillsEl.style.borderBottom = "2px solid #e94560";
                }
            });
            pillsEl.addEventListener("dragleave", (e) => {
                if (e.target === pillsEl) pillsEl.style.borderBottom = "";
            });
            pillsEl.addEventListener("drop", async (e) => {
                if (e.target !== pillsEl) return;
                e.preventDefault();
                pillsEl.style.borderBottom = "";
                if (!dragName) return;
                const newCols = [...visible];
                if (dragWasVisible) {
                    const srcIdx = newCols.indexOf(dragName);
                    if (srcIdx >= 0) newCols.splice(srcIdx, 1);
                }
                newCols.push(dragName);
                savedColumnOrder = newCols;
                await viewer.restore({ columns: newCols });
                renderColumns();
            });

            // Hidden list accepts drops (to hide a visible column)
            hiddenEl.addEventListener("dragover", (e) => {
                e.preventDefault();
                hiddenEl.style.borderTop = "2px solid #e94560";
            });
            hiddenEl.addEventListener("dragleave", () => {
                hiddenEl.style.borderTop = "";
            });
            hiddenEl.addEventListener("drop", async (e) => {
                e.preventDefault();
                hiddenEl.style.borderTop = "";
                if (!dragName || !dragWasVisible) return;
                const newCols = visible.filter(c => c !== dragName);
                savedColumnOrder = newCols;
                await viewer.restore({ columns: newCols });
                renderColumns();
            });

            // Click handlers: hide (✕) and show (+)
            pillsEl.querySelectorAll(".pill-remove").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const idx = parseInt(btn.dataset.idx);
                    const newCols = [...visible];
                    newCols.splice(idx, 1);
                    savedColumnOrder = newCols;
                    await viewer.restore({ columns: newCols });
                    renderColumns();
                });
            });
            hiddenEl.querySelectorAll(".pill-add").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const newCols = [...visible, btn.dataset.name];
                    savedColumnOrder = newCols;
                    await viewer.restore({ columns: newCols });
                    renderColumns();
                });
            });
        }

        // Aggregation
        const AGG_OPS = ["sum", "avg", "count", "min", "max", "first", "last"];

        function renderAgg() {
            const container = document.getElementById("agg-list");
            container.innerHTML = measures().map(c => `
                <div class="agg-row">
                    <span class="col-name">${c.name}</span>
                    <select data-col="${c.name}">
                        ${AGG_OPS.map(op =>
                            `<option value="${op}" ${c.aggregate_operator === op ? "selected" : ""}>${op}</option>`
                        ).join("")}
                    </select>
                </div>
            `).join("");

            container.querySelectorAll("select").forEach(sel => {
                sel.addEventListener("change", () => {
                    send({
                        cmd: "column",
                        name: sel.dataset.col,
                        aggregate_operator: sel.value,
                    });
                });
            });
        }

        // Filters
        function renderFilters() {
            const container = document.getElementById("filter-list");
            const clearBtn = document.getElementById("clear-filters-btn");
            clearBtn.style.display = state.filters.length > 0 ? "block" : "none";

            container.innerHTML = state.filters.map((f, i) => `
                <div class="filter-row">
                    <span style="font-size:11px">${f.field} ${f.op} ${f.value ?? ""}</span>
                    <button class="btn btn-sm" data-idx="${i}">x</button>
                </div>
            `).join("");

            // Remove individual filter = clear all and re-add others
            // (simplified: just show current filters as read-only)
        }

        document.getElementById("add-filter-btn").addEventListener("click", () => {
            const container = document.getElementById("filter-list");
            const colOpts = allColumns.map(c => `<option value="${c.name}">${c.name}</option>`).join("");
            const ops = ["eq", "ne", "gt", "lt", "ge", "le", "like", "contains", "is_null", "is_not_null"];
            const opOpts = ops.map(o => `<option value="${o}">${o}</option>`).join("");

            const row = document.createElement("div");
            row.className = "filter-row";
            row.innerHTML = `
                <select class="f-field">${colOpts}</select>
                <select class="f-op">${opOpts}</select>
                <input class="f-val" placeholder="value" />
                <button class="btn btn-sm f-go">Go</button>
            `;
            container.appendChild(row);

            row.querySelector(".f-go").addEventListener("click", () => {
                const field = row.querySelector(".f-field").value;
                const op = row.querySelector(".f-op").value;
                let value = row.querySelector(".f-val").value;
                // Try to parse as number
                if (value && !isNaN(Number(value))) value = Number(value);
                send({ cmd: "filter", field, op, value: value || null });
            });
        });

        document.getElementById("clear-filters-btn").addEventListener("click", () => {
            send({ cmd: "clear_filters" });
        });

        // Sort
        function renderSort() {
            const container = document.getElementById("sort-list");
            container.innerHTML = state.sort.map(s => `
                <div class="sort-row">
                    <span style="font-size:11px">${s.field} ${s.descending ? "DESC" : "ASC"}</span>
                </div>
            `).join("");
        }

        document.getElementById("add-sort-btn").addEventListener("click", () => {
            const container = document.getElementById("sort-list");
            const colOpts = allColumns.map(c => `<option value="${c.name}">${c.name}</option>`).join("");

            const row = document.createElement("div");
            row.className = "sort-row";
            row.innerHTML = `
                <select class="s-field">${colOpts}</select>
                <select class="s-dir">
                    <option value="false">ASC</option>
                    <option value="true">DESC</option>
                </select>
                <button class="btn btn-sm s-go">Go</button>
            `;
            container.appendChild(row);

            row.querySelector(".s-go").addEventListener("click", () => {
                // Collect all current sorts + new one
                const sorts = [...state.sort, {
                    field: row.querySelector(".s-field").value,
                    descending: row.querySelector(".s-dir").value === "true",
                }];
                send({ cmd: "sort", sorts });
            });
        });

        // Drill path
        function renderDrill() {
            const container = document.getElementById("drill-path");
            const upBtn = document.getElementById("drill-up-btn");
            const resetBtn = document.getElementById("drill-reset-btn");

            const hasGroupBy = state.group_by.length > 0;
            const hasDrill = state.drill_path.length > 0;

            upBtn.style.display = hasDrill ? "inline" : "none";
            resetBtn.style.display = hasDrill ? "inline" : "none";

            if (!hasGroupBy && !hasDrill) {
                container.innerHTML = `<span style="color:#888">All (leaf rows)</span>`;
                return;
            }

            let crumbs = [`<span style="color:#e94560; cursor:pointer" id="drill-root">All</span>`];
            state.drill_path.forEach((d) => {
                const label = Object.entries(d).map(([k, v]) => `${k}=${v}`).join(", ");
                crumbs.push(`<span style="color:#e94560">${label}</span>`);
            });
            if (hasGroupBy) {
                crumbs.push(`<span style="color:#888">[grouped by ${state.group_by.join(", ")}]</span>`);
            }
            container.innerHTML = crumbs.join(" &#9656; ");

            const rootEl = document.getElementById("drill-root");
            if (rootEl) rootEl.addEventListener("click", () => send({ cmd: "drill_reset" }));
        }

        document.getElementById("drill-up-btn").addEventListener("click", () => {
            send({ cmd: "drill_up" });
        });

        document.getElementById("drill-reset-btn").addEventListener("click", () => {
            send({ cmd: "drill_reset" });
        });

        // ── Row-click expand/collapse ─────────────────────
        viewer.addEventListener("perspective-click", (event) => {
            // Only expand if group_by is active
            if (!state || state.group_by.length === 0) return;

            const row = event.detail?.row;
            if (!row) return;

            // Derive depth from __depth__ column, or from __tree__ indent (6 nbsp per level)
            let depth = row["__depth__"];
            if (depth === undefined || depth === null) {
                const tree = row["__tree__"];
                if (!tree) return;
                // Count leading non-breaking spaces (6 per level)
                const match = tree.match(/^(\u00a0*)/);
                depth = match ? Math.floor(match[1].length / 6) : 0;
            }

            // Leaf rows (depth >= group_by.length) are not expandable
            if (depth >= state.group_by.length) return;

            // Build key array: values for group_by[0..depth] from the row
            const key = [];
            for (let i = 0; i <= depth; i++) {
                const dim = state.group_by[i];
                const val = row[dim];
                if (val === undefined || val === null) return;  // missing value, can't expand
                key.push(val);
            }

            if (key.length > 0) {
                send({ cmd: "expand", key });
            }
        });

        // SQL toggle
        document.getElementById("sql-toggle").addEventListener("click", () => {
            const el = document.getElementById("sql-preview");
            el.style.display = el.style.display === "none" ? "block" : "none";
        });

        // ── Shadow DOM hack: drag-and-drop column reorder ────
        // We intercept mousedown in CAPTURE phase to block Perspective's sort handler
        // (which calls preventDefault, killing native drag). Then we handle:
        //   - Click (no movement) → sort via viewer API
        //   - Drag (movement > 5px) → HTML5 drag-and-drop reorder
        (async function setupColumnDragDrop() {
            await viewer.flush();

            let dragSrcCol = null;

            function getHeaders() {
                const dg = viewer.querySelector("perspective-viewer-datagrid");
                if (!dg) return [];
                const rt = dg.querySelector("regular-table");
                if (!rt) return [];
                const thead = rt.querySelector("thead");
                if (!thead) return [];
                return [...thead.querySelectorAll("th")];
            }

            function getColName(th) {
                // Header text, stripping sort arrows
                return th.textContent.replace(/[▲▼↑↓⬆⬇]/g, "").trim();
            }

            function attachHandlers() {
                const ths = getHeaders();
                // headers found: ths.length

                ths.forEach(th => {
                    if (th._hackSetup) return;
                    th._hackSetup = true;
                    th.setAttribute("draggable", "true");

                    // CAPTURE phase mousedown — block Perspective's handler
                    let downX = 0, downY = 0, isDrag = false;
                    th.addEventListener("mousedown", (e) => {
                        downX = e.clientX;
                        downY = e.clientY;
                        isDrag = false;
                        // Block Perspective's sort handler from calling preventDefault
                        e.stopImmediatePropagation();
                    }, true);  // capture = true

                    // Track movement to detect drag vs click
                    th.addEventListener("mousemove", (e) => {
                        if (Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY) > 5) {
                            isDrag = true;
                        }
                    });

                    // Click (no drag) → sort
                    th.addEventListener("mouseup", async (e) => {
                        if (isDrag) return;
                        const colName = getColName(th);
                        if (!colName) return;
                        const config = await viewer.save();
                        const curSort = config.sort || [];
                        // Toggle: none → asc → desc → none
                        const existing = curSort.find(s => s[0] === colName);
                        let newSort;
                        if (!existing) {
                            newSort = [[colName, "asc"]];
                        } else if (existing[1] === "asc") {
                            newSort = [[colName, "desc"]];
                        } else {
                            newSort = [];
                        }
                        await viewer.restore({ sort: newSort });
                    });

                    // Drag events for reorder
                    th.addEventListener("dragstart", (e) => {
                        dragSrcCol = getColName(th);
                        th.style.opacity = "0.4";
                        e.dataTransfer.effectAllowed = "move";
                        e.dataTransfer.setData("text/plain", dragSrcCol);
                    });

                    th.addEventListener("dragover", (e) => {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = "move";
                        th.style.borderLeft = "3px solid #e94560";
                    });

                    th.addEventListener("dragleave", () => {
                        th.style.borderLeft = "";
                    });

                    th.addEventListener("dragend", () => {
                        th.style.opacity = "1";
                        getHeaders().forEach(t => { t.style.borderLeft = ""; });
                    });

                    th.addEventListener("drop", async (e) => {
                        e.preventDefault();
                        th.style.borderLeft = "";
                        const dropCol = getColName(th);
                        if (!dragSrcCol || dragSrcCol === dropCol) return;

                        const config = await viewer.save();
                        const cols = [...(config.columns || [])];
                        const srcIdx = cols.indexOf(dragSrcCol);
                        const dstIdx = cols.indexOf(dropCol);
                        if (srcIdx < 0 || dstIdx < 0) return;

                        cols.splice(srcIdx, 1);
                        cols.splice(dstIdx, 0, dragSrcCol);
                        savedColumnOrder = [...cols];  // persist across re-queries
                        await viewer.restore({ columns: cols });
                        dragSrcCol = null;
                        setTimeout(attachHandlers, 300);
                    });
                });
            }

            // Attach + re-attach on config changes, scroll, table loads
            setTimeout(attachHandlers, 500);
            viewer.addEventListener("perspective-config-update", () => setTimeout(attachHandlers, 200));
            // MutationObserver on regular-table for re-renders
            const dg = viewer.querySelector("perspective-viewer-datagrid");
            const rt = dg?.querySelector("regular-table");
            if (rt) {
                new MutationObserver(() => setTimeout(attachHandlers, 50))
                    .observe(rt, { childList: true, subtree: true });
            }
            const origLoadTable = loadTable;
            loadTable = async function(name) {
                await origLoadTable(name);
                setTimeout(attachHandlers, 500);
            };
        })();
    </script>
</body>
</html>
