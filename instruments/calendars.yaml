# Holiday calendars indexed by ISO 3166-1 alpha-2 Country/Market names.
# Rules:
# - fixed: [month, day, "Holiday Name"]
# - fixed_adjusted_rules: [month, day, "RuleName", "Holiday Name"]
# - nth_weekday_rules: [month, weekday, n, "Holiday Name"]
# - easter_relative_rules: [offset, "Holiday Name"]

US: # United States Settlement (Fed Reserve)
  fixed_adjusted_rules:
    - [1, 1, "MondayIfSunday", "New Year's Day"]
    - [6, 19, "MondayIfSunday", "Juneteenth"]
    - [7, 4, "MondayIfSunday", "Independence Day"]
    - [11, 11, "MondayIfSunday", "Veterans Day"]
    - [12, 25, "MondayIfSunday", "Christmas Day"]
  nth_weekday_rules:
    - [1, 0, 3, "Martin Luther King Jr. Day"]
    - [2, 0, 3, "Washington's Birthday"]
    - [5, 0, -1, "Memorial Day"]
    - [9, 0, 1, "Labor Day"]
    - [10, 0, 2, "Columbus Day"]
    - [11, 3, 4, "Thanksgiving Day"]
  ad_hoc: ["2025-01-09"]
  weekend: [5, 6]

US_GOVT: # US Government Bond Market (SOFR fixing)
  fixed_adjusted_rules:
    - [1, 1, "MondayIfSunday", "New Year's Day"]
    - [6, 19, "MondayIfSunday", "Juneteenth"]
    - [7, 4, "MondayIfSunday", "Independence Day"]
    - [11, 11, "MondayIfSunday", "Veterans Day"]
    - [12, 25, "MondayIfSunday", "Christmas Day"]
  nth_weekday_rules:
    - [1, 0, 3, "Martin Luther King Jr. Day"]
    - [2, 0, 3, "Washington's Birthday"]
    - [5, 0, -1, "Memorial Day"]
    - [9, 0, 1, "Labor Day"]
    - [10, 0, 2, "Columbus Day"]
    - [11, 3, 4, "Thanksgiving Day"]
  easter_relative_rules: [[-2, "Good Friday"]]
  ad_hoc: ["2025-01-09"]
  weekend: [5, 6]

